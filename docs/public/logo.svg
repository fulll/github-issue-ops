<svg width="120" height="100" viewBox="0 0 120 100" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Main gradient: blue → cyan-blue -->
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0033DD"/>
      <stop offset="100%" stop-color="#0088BB"/>
    </linearGradient>
    <!-- Top gloss -->
    <linearGradient id="gloss" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff" stop-opacity=".20"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- Window background -->
  <rect width="120" height="100" rx="14" fill="url(#bg)"/>
  <!-- Top gloss overlay -->
  <rect width="120" height="48" rx="14" fill="url(#gloss)"/>

  <!-- Traffic lights -->
  <circle cx="17" cy="18" r="5" fill="#FF5F57"/>
  <circle cx="31" cy="18" r="5" fill="#FEBC2E"/>
  <circle cx="45" cy="18" r="5" fill="#28C840"/>

  <!-- Title bar separator -->
  <line x1="8" y1="30" x2="112" y2="30" stroke="#ffffff" stroke-opacity=".12" stroke-width=".75"/>

  <!-- "gio_" prompt -->
  <text
    x="13" y="64"
    font-family="'SF Mono','Fira Code','Consolas',monospace"
    font-size="21"
    font-weight="600"
    fill="white"
    letter-spacing="-0.3"
  >gio_</text>

  <!-- Crosshair target — bottom right, all white -->
  <!-- center at (97, 72) -->
  <!-- outer circle r=16 -->
  <circle cx="97" cy="72" r="16" stroke="white" stroke-width="2" stroke-opacity=".9"/>
  <!-- inner circle r=6.5 -->
  <circle cx="97" cy="72" r="6.5" stroke="white" stroke-width="1.75" stroke-opacity=".9"/>
  <!-- center dot -->
  <circle cx="97" cy="72" r="2.3" fill="white"/>
  <!-- branches -->
  <line x1="97" y1="54"   x2="97" y2="65.5"  stroke="white" stroke-width="2" stroke-linecap="round" stroke-opacity=".9"/>
  <line x1="97" y1="78.5" x2="97" y2="90"    stroke="white" stroke-width="2" stroke-linecap="round" stroke-opacity=".9"/>
  <line x1="79" y1="72"   x2="90.5" y2="72"  stroke="white" stroke-width="2" stroke-linecap="round" stroke-opacity=".9"/>
  <line x1="103.5" y1="72" x2="115" y2="72"  stroke="white" stroke-width="2" stroke-linecap="round" stroke-opacity=".9"/>
</svg>
