<svg width="100" height="100" viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0033DD"/>
      <stop offset="100%" stop-color="#0088BB"/>
    </linearGradient>
    <linearGradient id="gloss" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff" stop-opacity=".22"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- Window background (square) -->
  <rect width="100" height="100" rx="18" fill="url(#bg)"/>
  <!-- Top gloss -->
  <rect width="100" height="44" rx="18" fill="url(#gloss)"/>

  <!-- Traffic lights -->
  <circle cx="16" cy="17" r="5" fill="#FF5F57"/>
  <circle cx="29" cy="17" r="5" fill="#FEBC2E"/>
  <circle cx="42" cy="17" r="5" fill="#28C840"/>

  <!-- Title bar separator -->
  <line x1="6" y1="28" x2="94" y2="28" stroke="#ffffff" stroke-opacity=".12" stroke-width="1"/>

  <!-- Crosshair target centered in lower area -->
  <!-- center at (52, 64) — slightly left of center to leave visual breathing room -->
  <circle cx="52" cy="65" r="22" stroke="white" stroke-width="3" stroke-opacity=".92"/>
  <circle cx="52" cy="65" r="9"  stroke="white" stroke-width="2.5" stroke-opacity=".92"/>
  <circle cx="52" cy="65" r="3.5" fill="white"/>
  <!-- branches -->
  <line x1="52" y1="37"   x2="52" y2="56"   stroke="white" stroke-width="3" stroke-linecap="round" stroke-opacity=".92"/>
  <line x1="52" y1="74"   x2="52" y2="93"   stroke="white" stroke-width="3" stroke-linecap="round" stroke-opacity=".92"/>
  <line x1="24"  y1="65"  x2="43"  y2="65"  stroke="white" stroke-width="3" stroke-linecap="round" stroke-opacity=".92"/>
  <line x1="61"  y1="65"  x2="80"  y2="65"  stroke="white" stroke-width="3" stroke-linecap="round" stroke-opacity=".92"/>
</svg>
